<style>
        body {
            background: radial-gradient(circle at center, #18181b 0%, #050505 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .glass-panel {
            background: #0e0e11;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .dobi-orb {
            background: linear-gradient(135deg, #ffc640, #e05f60);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
            position: relative;
        }

        .dobi-orb::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: inherit;
            filter: blur(8px);
            opacity: 0.5;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 0.6; }
        }

        .message-enter {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: currentColor;
            border-radius: 50%;
            animation: dotPulse 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }
        
        .chat-container {
            height: 85vh;
            max-width: 480px;
        }

        .bot-bubble {
            background: rgba(37, 99, 235, 0.9);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.3);
            color: #ffffff;
            border-left: 2px solid #60a5fa;
        }

        .user-bubble {
            background: rgba(30, 58, 138, 0.4);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #e5e7eb;
            border-right: 2px solid #2563eb;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4" style="background: radial-gradient(circle, rgb(42, 41, 45) 0%, rgb(19, 19, 22) 100%); min-height: 100vh; overflow: hidden;">
<!-- Main Chat Interface -->
<main class="chat-container w-full glass-panel rounded-2xl flex flex-col overflow-hidden relative" style="background: rgb(32, 31, 35); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: rgba(0, 0, 0, 0.6) 0px 10px 40px;">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-4 border-b border-white/5 bg-black/40">
<div class="flex items-center gap-3">
<img alt="DOBI" class="w-10 h-10 rounded-full shrink-0 object-cover" src="dobi-avatar.png"/>
<div>
<h1 class="font-headline-sm text-headline-sm text-white leading-none">DOBI</h1>
<p class="text-[11px] text-zinc-400 font-body-md opacity-80">Your friendly AI assistant</p>
</div>
</div>
<button class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-white/10 text-zinc-300 font-label-caps hover:bg-white/5 transition-all active:scale-95 focus:outline-none focus:ring-1 focus:ring-zinc-700" id="reset-btn">
<span class="material-symbols-outlined text-[16px]">restart_alt</span>
                Reset Chat
            </button>
</header>
<!-- Message Area -->
<div class="flex-1 overflow-y-auto px-6 py-8 space-y-6 flex flex-col" id="chat-scroller">
<!-- Bot Greeting -->
<div class="flex flex-col gap-2 max-w-[85%] self-start message-enter">
<div class="p-4 rounded-2xl rounded-tl-none font-body-md bot-bubble">
                    Hello! I am DOBI, your celestial AI companion. How can I help you today?
                </div>
<span class="text-[10px] text-zinc-500 ml-1 font-label-caps uppercase tracking-wider">Celestial AI • Just now</span>
</div>
</div>
<!-- Typing Indicator (Hidden by default) -->
<div class="hidden px-6 py-2" id="typing-indicator">
<div class="flex gap-1.5 items-center text-blue-400 bg-blue-900/20 w-fit px-4 py-3 rounded-full">
<div class="typing-dot"></div>
<div class="typing-dot"></div>
<div class="typing-dot"></div>
</div>
</div>
<!-- Input Area -->
<footer class="p-6 pt-2 bg-gradient-to-t from-black/20 to-transparent">
<div class="relative group">
<textarea class="w-full bg-black/40 text-white border border-white/10 rounded-2xl py-4 pl-5 pr-16 focus:ring-1 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all resize-none font-body-md placeholder:text-zinc-600" id="chat-input" placeholder="Ask anything..." rows="1"></textarea>
<button class="absolute right-3 bottom-3 w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)] hover:bg-blue-500 transition-all active:scale-90 disabled:opacity-30 disabled:grayscale focus:outline-none focus:ring-2 focus:ring-blue-500/50" disabled="" id="send-btn">
<span class="material-symbols-outlined">send</span>
</button>
</div>
<p class="text-center text-[10px] text-zinc-700 mt-4 font-label-caps uppercase tracking-widest">Powered by DOBI Neural Engine</p>
</footer>
</main>
<script>
        // Replace this with your actual Render backend URL once deployed,
        // e.g. "https://dobi-backend.onrender.com"
        const BACKEND_URL = "https://dobi-backend.onrender.com";

        const chatScroller = document.getElementById('chat-scroller');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const resetBtn = document.getElementById('reset-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // Auto-grow textarea
        chatInput.addEventListener('input', () => {
            chatInput.style.height = 'auto';
            chatInput.style.height = (chatInput.scrollHeight) + 'px';
            sendBtn.disabled = chatInput.value.trim().length === 0;
        });

        // Handle Send
        async function handleSendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            // Add User Bubble
            addMessage(message, 'user');
            
            // UI Reset
            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendBtn.disabled = true;
            
            // Show Typing
            typingIndicator.classList.remove('hidden');
            scrollToBottom();

            try {
                const response = await fetch(`${BACKEND_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                
                typingIndicator.classList.add('hidden');
                
                if (data.reply) {
                    addMessage(data.reply, 'bot');
                } else {
                    addMessage("I'm sorry, I've drifted off course. Please try again.", 'bot', true);
                }
            } catch (error) {
                typingIndicator.classList.add('hidden');
                addMessage("Celestial interference detected. Unable to reach DOBI.", 'bot', true);
            }
            
            scrollToBottom();
        }

        function addMessage(text, type, isError = false) {
            const div = document.createElement('div');
            const isBot = type === 'bot';

            div.className = `flex flex-col gap-2 max-w-[85%] ${isBot ? 'self-start' : 'self-end'} message-enter mb-6`;

            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const bubble = document.createElement('div');
            bubble.className = `p-4 rounded-2xl font-body-md shadow-lg ${
                isBot
                    ? 'bot-bubble rounded-tl-none ' + (isError ? '!border-red-500 !bg-red-900/40' : '')
                    : 'user-bubble rounded-tr-none'
            }`;
            bubble.textContent = text; // safe: renders as plain text, not HTML

            const label = document.createElement('span');
            label.className = `text-[10px] text-zinc-500 ${isBot ? 'ml-1' : 'mr-1 self-end'} font-label-caps`;
            label.textContent = `${isBot ? 'DOBI AI' : 'You'} • ${timestamp}`;

            div.appendChild(bubble);
            div.appendChild(label);
            chatScroller.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatScroller.scrollTo({
                top: chatScroller.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Handle Reset
        resetBtn.addEventListener('click', async () => {
            if (confirm('Are you sure you want to clear your celestial journey?')) {
                try {
                    await fetch(`${BACKEND_URL}/api/reset`, { method: 'POST' });
                    // Visual clear
                    const messages = chatScroller.querySelectorAll('.message-enter');
                    // Keep greeting
                    messages.forEach((m, index) => {
                        if (index > 0) m.remove();
                    });
                } catch (e) {
                    console.error('Reset failed');
                }
            }
        });

        // Event Listeners
        sendBtn.addEventListener('click', handleSendMessage);
        
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
            }
        });

        // Initialize Focus
        window.onload = () => chatInput.focus();
    </script>


</body></html>
